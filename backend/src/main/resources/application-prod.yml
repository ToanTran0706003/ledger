# Profile prod: log JSON có cấu trúc (ECS) kèm correlationId/userId (qua MDC) — sẵn sàng
# cho hệ thống thu thập log. Kích hoạt: SPRING_PROFILES_ACTIVE=prod.
# JWT secret BẮT BUỘC lấy từ biến môi trường LEDGER_JWT_SECRET (xem application.yml).
logging:
  structured:
    format:
      console: ecs

# An toàn mặc định ở prod: KHÔNG tự seed admin mật khẩu mặc định. Muốn dùng thì bật tường minh
# + đặt LEDGER_ADMIN_PASSWORD mạnh (xem ADR-0017).
ledger:
  admin:
    bootstrap:
      enabled: false
