# Profile prod: log JSON có cấu trúc (ECS) kèm correlationId/userId (qua MDC) — sẵn sàng
# cho hệ thống thu thập log. Kích hoạt: SPRING_PROFILES_ACTIVE=prod.
# JWT secret BẮT BUỘC lấy từ biến môi trường LEDGER_JWT_SECRET (xem application.yml).
logging:
  structured:
    format:
      console: ecs

# Không lộ chi tiết lỗi ra client ở prod (audit #7): không stacktrace/message/binding-errors.
server:
  error:
    include-stacktrace: never
    include-message: never
    include-exception: false
    include-binding-errors: never

# Siết actuator ở prod (audit #4): KHÔNG expose prometheus/metrics ra ngoài (đặt sau mạng quản trị
# nếu cần scrape); chi tiết health chỉ cho người đã xác thực.
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# An toàn mặc định ở prod: KHÔNG tự seed admin mật khẩu mặc định. Muốn dùng thì bật tường minh
# + đặt LEDGER_ADMIN_PASSWORD mạnh (xem ADR-0017). CORS: đặt LEDGER_CORS_ORIGINS = domain frontend.
ledger:
  admin:
    bootstrap:
      enabled: false
