spring:
  application:
    name: ledger

  datasource:
    # Dev mặc định Postgres local; prod BẮT BUỘC đặt qua biến môi trường (ProdSecurityGuard chặn
    # khởi động nếu password vẫn là mặc định dev).
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ledger}
    username: ${SPRING_DATASOURCE_USERNAME:ledger}
    password: ${SPRING_DATASOURCE_PASSWORD:ledger}

  jpa:
    hibernate:
      # Flyway quản lý schema, không để Hibernate tự tạo/sửa bảng.
      ddl-auto: none
    # Tắt Open-Session-In-View: tránh giữ session DB suốt vòng đời request (anti-pattern).
    open-in-view: false

  flyway:
    enabled: true
    # Cho phép chạy migration trên DB đã có dữ liệu/bảng sẵn.
    baseline-on-migrate: true
    placeholders:
      # Khoá HMAC cho hash-chain (V16 backfill). PHẢI trùng ledger.security.hashchain.key bên dưới
      # để app tái tính hash khớp. Prod đặt LEDGER_HASHCHAIN_KEY.
      hashchainKey: "${LEDGER_HASHCHAIN_KEY:dev-hashchain-key-change-in-prod-0123456789abcdef}"

  kafka:
    bootstrap-servers: "${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}"
    consumer:
      auto-offset-reset: earliest
    admin:
      # Kafka tắt -> không có broker; đừng để KafkaAdmin chặn khởi động.
      fail-fast: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ledger

ledger:
  kafka:
    # Event backbone (ADR-0023). Mặc định TẮT -> projection in-process (effectively-once). Bật khi
    # có Kafka chạy (ops/docker-compose.yml) -> outbox publish lên topic, consumer projection async.
    enabled: false
    topic: ledger.events
    group-id: ledger-projector
  datasource:
    read:
      # CQRS read/write split (ADR-0022): đường đọc nặng (kiểm toán/báo cáo) tách sang đây. Mặc định
      # cùng DB ghi (một máy dev). Prod đặt LEDGER_READ_DATASOURCE_URL = read replica.
      url: "${LEDGER_READ_DATASOURCE_URL:${spring.datasource.url}}"
      username: "${spring.datasource.username}"
      password: "${spring.datasource.password}"
      configuration:
        # Pool nhỏ: đọc kiểm toán/báo cáo ít đồng thời, không cần nhiều kết nối.
        maximum-pool-size: 4
  cors:
    # Dev nới '*'. Prod đặt LEDGER_CORS_ORIGINS = danh sách domain frontend (phẩy) để siết origin.
    allowed-origins: "${LEDGER_CORS_ORIGINS:*}"
  vault:
    # Lượng tiền "khai sinh" nạp vào MỖI vault tiền tệ; cũng là hằng số integrity check (per-currency).
    seed-amount: 1000000000000.00
    # Mỗi tiền tệ một vault riêng (VND giữ id cũ "SYSTEM_VAULT"). Thêm tiền tệ -> thêm vào đây.
    # Dạng chuỗi phẩy (KHÔNG phải YAML list) để @Value bind đúng vào List<String>.
    currencies: VND,USD
  fx:
    # Tỉ giá do hệ thống cấu hình: 1 đơn vị FROM = rate đơn vị TO. Client KHÔNG tự đặt tỉ giá.
    rates:
      VND: { USD: 0.00004 }   # 25000 VND = 1 USD
      USD: { VND: 25000 }
  outbox:
    # Relay poll outbox định kỳ (lưới an toàn). Tắt trong test để tất định.
    scheduler-enabled: true
    poll-interval-ms: 1000
  snapshot:
    # Ghi snapshot mỗi N event trên một aggregate để load ≈ hằng số.
    every-n-events: 50
  savings:
    # Lãi suất năm cho tài khoản tiết kiệm (5%).
    annual-rate: 0.05
  standing-orders:
    # Scheduler chạy lệnh chuyển định kỳ đến hạn. Tắt trong test để tất định.
    scheduler-enabled: true
    poll-interval-ms: 5000
  holds:
    # Scheduler tự nhả hold đã hết hạn. Tắt trong test để tất định.
    scheduler-enabled: true
    poll-interval-ms: 5000
  maker-checker:
    # Nguyên tắc bốn-mắt: chuyển tiền >= ngưỡng phải được ADMIN KHÁC người tạo duyệt. Tắt trong test.
    enabled: true
    threshold: 100000000
  fraud:
    # Phát hiện gian lận sau mỗi lệnh ghi nợ; tự đóng băng nếu chạm ngưỡng. Tắt trong test.
    enabled: true
    window-seconds: 60
    max-debits-per-window: 10
    large-amount: 100000000
  daily-limit:
    # Hạn mức tổng ghi nợ (rút + chuyển) theo ngày cho mỗi tài khoản khách. Tắt trong test.
    enabled: true
    max-per-day: 500000000
    zone: Asia/Ho_Chi_Minh
  admin:
    bootstrap:
      # Tạo sẵn 1 tài khoản ADMIN khi khởi động (để vận hành/kiểm toán đăng nhập ngay).
      # ĐỔI mật khẩu hoặc TẮT trong production (qua biến môi trường).
      enabled: true
      username: admin
      password: "${LEDGER_ADMIN_PASSWORD:admin12345}"
  rate-limit:
    # Giới hạn tần suất request ghi theo IP (chống dò mật khẩu / lạm dụng). Tắt trong test.
    enabled: true
    auth: { capacity: 10, refill-per-minute: 10 }   # đăng nhập/đăng ký: chặt
    write: { capacity: 60, refill-per-minute: 60 }   # lệnh ghi tiền: rộng hơn
  security:
    jwt:
      # HS256: secret tối thiểu 32 byte. ĐỔI trong production (qua biến môi trường).
      secret: "${LEDGER_JWT_SECRET:dev-only-secret-please-change-32bytes-minimum-0123456789}"
      access-ttl-minutes: 15
      refresh-ttl-days: 7
    hashchain:
      # Khoá HMAC-SHA256 cho hash-chain (tamper-PROOF: attacker ghi DB nhưng không có khoá thì không
      # tự tính lại chuỗi hợp lệ). PHẢI trùng spring.flyway.placeholders.hashchainKey. Prod đặt env.
      key: "${LEDGER_HASHCHAIN_KEY:dev-hashchain-key-change-in-prod-0123456789abcdef}"

