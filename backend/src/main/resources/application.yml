spring:
  application:
    name: ledger

  datasource:
    url: jdbc:postgresql://localhost:5432/ledger
    username: ledger
    password: ledger

  jpa:
    hibernate:
      # Flyway quản lý schema, không để Hibernate tự tạo/sửa bảng.
      ddl-auto: none
    # Tắt Open-Session-In-View: tránh giữ session DB suốt vòng đời request (anti-pattern).
    open-in-view: false

  flyway:
    enabled: true
    # Cho phép chạy migration trên DB đã có dữ liệu/bảng sẵn.
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ledger

ledger:
  vault:
    # Lượng tiền "khai sinh" nạp vào SYSTEM_VAULT; cũng là hằng số integrity check đối chiếu.
    seed-amount: 1000000000000.00
  outbox:
    # Relay poll outbox định kỳ (lưới an toàn). Tắt trong test để tất định.
    scheduler-enabled: true
    poll-interval-ms: 1000
  snapshot:
    # Ghi snapshot mỗi N event trên một aggregate để load ≈ hằng số.
    every-n-events: 50
  savings:
    # Lãi suất năm cho tài khoản tiết kiệm (5%).
    annual-rate: 0.05
  standing-orders:
    # Scheduler chạy lệnh chuyển định kỳ đến hạn. Tắt trong test để tất định.
    scheduler-enabled: true
    poll-interval-ms: 5000
  holds:
    # Scheduler tự nhả hold đã hết hạn. Tắt trong test để tất định.
    scheduler-enabled: true
    poll-interval-ms: 5000
  fraud:
    # Phát hiện gian lận sau mỗi lệnh ghi nợ; tự đóng băng nếu chạm ngưỡng. Tắt trong test.
    enabled: true
    window-seconds: 60
    max-debits-per-window: 10
    large-amount: 100000000
  daily-limit:
    # Hạn mức tổng ghi nợ (rút + chuyển) theo ngày cho mỗi tài khoản khách. Tắt trong test.
    enabled: true
    max-per-day: 500000000
    zone: Asia/Ho_Chi_Minh
  admin:
    bootstrap:
      # Tạo sẵn 1 tài khoản ADMIN khi khởi động (để vận hành/kiểm toán đăng nhập ngay).
      # ĐỔI mật khẩu hoặc TẮT trong production (qua biến môi trường).
      enabled: true
      username: admin
      password: "${LEDGER_ADMIN_PASSWORD:admin12345}"
  rate-limit:
    # Giới hạn tần suất request ghi theo IP (chống dò mật khẩu / lạm dụng). Tắt trong test.
    enabled: true
    auth: { capacity: 10, refill-per-minute: 10 }   # đăng nhập/đăng ký: chặt
    write: { capacity: 60, refill-per-minute: 60 }   # lệnh ghi tiền: rộng hơn
  security:
    jwt:
      # HS256: secret tối thiểu 32 byte. ĐỔI trong production (qua biến môi trường).
      secret: "${LEDGER_JWT_SECRET:dev-only-secret-please-change-32bytes-minimum-0123456789}"
      access-ttl-minutes: 15
      refresh-ttl-days: 7

