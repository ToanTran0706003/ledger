# Profile test: dùng database ledger_test riêng (cách ly khỏi dữ liệu dev).
# Tạm thời trỏ vào PostgreSQL local; khi sửa được Docker sẽ chuyển sang Testcontainers.
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ledger_test
    username: ledger
    password: ledger
    # Test có nhiều application context cache song song -> giữ pool NHỎ để tổng kết nối không vượt
    # max_connections của Postgres (write + read pool cho mỗi context). Nhỏ hơn cả mặc định cũ.
    hikari:
      maximum-pool-size: 4

management:
  tracing:
    enabled: false

ledger:
  datasource:
    read:
      configuration:
        # Pool đọc nhỏ trong test (tổng kết nối/context = write 4 + read 2).
        maximum-pool-size: 2
  vault:
    # Test mặc định CHỈ VND (giữ giả định một-tiền-tệ của các test cũ); test multi-currency tự
    # bật VND,USD qua @TestPropertySource. KHÔNG kế thừa "VND,USD" từ application.yml.
    currencies: VND
  outbox:
    # Test tự gọi drain (qua handler) -> tắt scheduler để kết quả tất định, không flaky.
    scheduler-enabled: false
  snapshot:
    # N nhỏ để test snapshot kích hoạt nhanh.
    every-n-events: 3
  standing-orders:
    # Test tự gọi runDue -> tắt scheduler để tất định.
    scheduler-enabled: false
  holds:
    # Test tự gọi expireDue -> tắt scheduler để tất định.
    scheduler-enabled: false
  maker-checker:
    # Mặc định TẮT trong test (transfer chạy ngay); test maker-checker tự bật qua @TestPropertySource.
    enabled: false
  fraud:
    # Mặc định TẮT trong test để không nhiễu các kịch bản khác; test fraud tự bật qua @TestPropertySource.
    enabled: false
  daily-limit:
    # Mặc định TẮT trong test; test hạn mức tự bật + ngưỡng thấp qua @TestPropertySource.
    enabled: false
  admin:
    bootstrap:
      # Tắt seed admin tự động trong test để không nhiễu user; test gọi service trực tiếp.
      enabled: false
  rate-limit:
    # Tắt mặc định trong test (nhiều test gọi dồn endpoint); test rate-limit tự bật qua @TestPropertySource.
    enabled: false
  savings:
    # Lãi suất test cao bất thường để lãi quan sát được trong vài ms (chỉ kiểm wiring;
    # độ chính xác toán đã được InterestCalculatorTest phủ với số chính xác).
    annual-rate: 1000
