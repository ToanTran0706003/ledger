global:
  scrape_interval: 5s

scrape_configs:
  - job_name: ledger-core
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - ledger-core:8080

  - job_name: audit-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - audit-service:8081

  - job_name: saga-orchestrator
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - saga-orchestrator:8082

  - job_name: compliance-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - compliance-service:8083
