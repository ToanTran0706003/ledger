server:
  port: 8090

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: ledger-core
              uri: ${LEDGER_CORE_URL:http://localhost:8080}
              predicates:
                - Path=/api/core/**
              filters:
                - StripPrefix=2
            - id: audit-service
              uri: ${AUDIT_URL:http://localhost:8081}
              predicates:
                - Path=/api/audit/**
              filters:
                - StripPrefix=2
            - id: saga-orchestrator
              uri: ${SAGA_URL:http://localhost:8082}
              predicates:
                - Path=/api/saga/**
              filters:
                - StripPrefix=2

management:
  endpoints:
    web:
      exposure:
        include: health,info
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}
