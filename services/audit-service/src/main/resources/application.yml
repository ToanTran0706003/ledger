server:
  port: 8081

spring:
  application:
    name: audit-service
  datasource:
    url: ${AUDIT_DB_URL:jdbc:postgresql://localhost:5432/ledger_audit}
    username: ${AUDIT_DB_USER:ledger}
    password: ${AUDIT_DB_PASSWORD:ledger}
  flyway:
    enabled: true
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: audit-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

ledger:
  audit:
    seed-amount: 1000000000000.00
    topic: ledger.events

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}
