server:
  port: 8083

spring:
  application:
    name: compliance-service

ledger:
  compliance:
    threshold: 50000000

management:
  endpoints:
    web:
      exposure:
        include: health
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}
